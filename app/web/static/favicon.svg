<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#0d6efd" stroke="#0a58ca" stroke-width="2"/>
  
  <!-- Document shape -->
  <rect x="25" y="20" width="50" height="60" rx="3" ry="3" fill="white" opacity="0.95"/>
  
  <!-- Text lines on document -->
  <line x1="32" y1="30" x2="68" y2="30" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="40" x2="68" y2="40" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="50" x2="68" y2="50" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="60" x2="60" y2="60" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Checkmark -->
  <path d="M 35 70 L 45 80 L 65 55" fill="none" stroke="#198754" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Russian flag stripe accent -->
  <rect x="25" y="75" width="50" height="5" fill="#0039A6"/>
