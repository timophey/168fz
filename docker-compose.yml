version: '3.8'

services:
  checker:
    build: .
    container_name: fz168-checker
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    volumes:
      # Монтируем словари для сохранения между перезапусками
      - ./dictionaries/data:/app/dictionaries/data
      # Монтируем пользовательские словари (не в git)
      - ./dictionaries/user_data:/app/dictionaries/user_data
      # Монтируем кэш синхронизации
      - ./sync/cache:/app/sync/cache
      # Монтируем конфиги
      - ./config:/app/config
    environment:
      - DICTIONARIES_DIR=/app/dictionaries/data
      - USER_DATA_DIR=/app/dictionaries/user_data
      - HOST=0.0.0.0
      - PORT=${PORT:-8000}
      - ADMIN_KEY=${ADMIN_KEY:-admin123}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8000}/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - fz168-network

networks:
  fz168-network:
    driver: bridge
